<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with subtle gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89b4fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#74c7ec;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow for depth -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="115" fill="url(#bgGradient)"/>
  
  <!-- Letter K with git branch style -->
  <g fill="#1e1e2e" filter="url(#shadow)">
    <!-- Main vertical bar of K -->
    <rect x="120" y="140" width="60" height="232" rx="8"/>
    
    <!-- Upper diagonal of K (branch going up-right) -->
    <path d="M 180 230 L 340 140 L 380 170 L 220 260 Z" />
    
    <!-- Lower diagonal of K (branch going down-right) -->
    <path d="M 180 270 L 220 255 L 380 342 L 340 372 Z" />
    
    <!-- Small commit nodes (circles) -->
    <circle cx="150" cy="160" r="18"/>
    <circle cx="150" cy="250" r="22"/>
    <circle cx="150" cy="352" r="18"/>
    <circle cx="360" cy="155" r="18"/>
    <circle cx="360" cy="357" r="18"/>
  </g>
</svg>
